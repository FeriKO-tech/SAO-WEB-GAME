<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тикеты поддержки | Sword Art Online</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="/preload-prefs.js"></script>
    <link rel="stylesheet" href="/src/styles/main.css">
    <link rel="stylesheet" href="/src/styles/pages/tickets.css">
</head>
<body class="page-admin-tickets">
<a href="support.html" class="back-link" data-i18n="backToSupport">← К поддержке</a>

<div class="sao-lang-switcher fixed" id="lang-switcher">
    <button class="sao-lang-btn" id="lang-btn" type="button" aria-label="Сменить язык" data-i18n="languageSwitcherLabel" data-i18n-attr="aria-label">
        <span id="current-lang">RU</span>
        <span class="arrow">▼</span>
    </button>
    <div class="sao-lang-dropdown" id="lang-dropdown">
        <a href="#" class="active" data-lang="RU">RU - Русский</a>
        <a href="#" data-lang="EN">EN - English</a>
        <a href="#" data-lang="DE">DE - Deutsch</a>
        <a href="#" data-lang="FR">FR - Français</a>
        <a href="#" data-lang="PL">PL - Polski</a>
        <a href="#" data-lang="ES">ES - Español</a>
        <a href="#" data-lang="CZ">CZ - Čeština</a>
        <a href="#" data-lang="IT">IT - Italiano</a>
        <a href="#" data-lang="UA">UA - Українська</a>
    </div>
</div>

<main class="tickets-page">
    <header class="tickets-header">
        <h1 data-i18n="adminTitle">Тикеты поддержки</h1>
        <p data-i18n="adminSubtitle">Управление обращениями пользователей.</p>
    </header>

    <div class="tickets-actions">
        <div class="filter-tabs" role="tablist" aria-label="Фильтры" data-i18n="filtersLabel" data-i18n-attr="aria-label">
            <button type="button" class="filter-tab active" data-filter="all">
                <span data-i18n="filterAll">Все</span>
                <span class="filter-tab-count" data-count="all" hidden></span>
            </button>
            <button type="button" class="filter-tab" data-filter="open">
                <span data-i18n="filterOpen">Открытые</span>
                <span class="filter-tab-count" data-count="open" hidden></span>
            </button>
            <button type="button" class="filter-tab" data-filter="resolved">
                <span data-i18n="filterResolved">Решенные</span>
                <span class="filter-tab-count" data-count="resolved" hidden></span>
            </button>
        </div>
        <input
            id="admin-search-input"
            class="admin-search-input"
            type="search"
            data-i18n="adminSearchPlaceholder"
            data-i18n-attr="placeholder"
            placeholder="Поиск по номеру, теме, @username, email"
        >
        <label class="admin-unread-toggle">
            <input id="admin-unread-toggle" type="checkbox">
            <span data-i18n="filterUnreadOnly">Только непрочитанные</span>
            <span class="admin-unread-count" id="admin-unread-count" hidden></span>
        </label>
        <button
            type="button"
            id="admin-notify-btn"
            class="admin-notify-btn"
            data-i18n="adminEnableNotifications"
            hidden
        >Включить уведомления</button>
    </div>

    <div id="admin-tickets-list" class="ticket-list" aria-live="polite"></div>
    <div id="admin-tickets-empty" class="tickets-empty" hidden data-i18n="noTickets">У вас пока нет тикетов.</div>
</main>

<script type="module" src="/src/pages/admin-tickets.ts"></script>
</body>
</html>
